version: 2
updates:
  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/sonarr"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(sonarr)"

  - package-ecosystem: "docker"
    directory: "/radarr"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(radarr)"

  - package-ecosystem: "docker"
    directory: "/sabnzbd"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(sabnzbd)"

  - package-ecosystem: "docker"
    directory: "/prowlarr"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(prowlarr)"

  - package-ecosystem: "docker"
    directory: "/plex"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(plex)"

  - package-ecosystem: "docker"
    directory: "/dashy"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(dashy)"

  - package-ecosystem: "docker"
    directory: "/wireguard-ui"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(wireguard-ui)"

  - package-ecosystem: "docker"
    directory: "/syncthing"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(syncthing)"

  - package-ecosystem: "docker"
    directory: "/caddy"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker(caddy)"

  # Python dependencies (SABnzbd)
  - package-ecosystem: "pip"
    directory: "/sabnzbd"
    target-branch: "hardening"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "deps(sabnzbd)"
