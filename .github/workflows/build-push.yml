# =============================================================================
# Publish — Build, Sign, and Push Hardened Docker Images
# Runs ONLY on main after CI Gate has validated the code.
# Supply chain security: Cosign signatures, SBOM (Syft), SLSA provenance
# =============================================================================

name: Publish Images

on:
  push:
    branches: [main]
    paths:
      - 'sonarr/**'
      - 'radarr/**'
      - 'transmission/**'
      - 'prowlarr/**'
      - 'plex/**'
      - 'dashy/**'
      - 'wireguard-ui/**'
      - 'syncthing/**'
      - 'caddy/**'
      - 'shared/**'
      - '.github/workflows/build-push.yml'
  schedule:
    # Rebuild weekly to pick up base image security patches
    - cron: '0 4 * * 1'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write          # Required for Cosign keyless signing (OIDC)
      attestations: write      # Required for GitHub artifact attestations
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sonarr
            context: .
            dockerfile: sonarr/Dockerfile
          - name: radarr
            context: .
            dockerfile: radarr/Dockerfile
          - name: transmission
            context: .
            dockerfile: transmission/Dockerfile
          - name: prowlarr
            context: .
            dockerfile: prowlarr/Dockerfile
          - name: plex
            context: .
            dockerfile: plex/Dockerfile
          - name: dashy
            context: .
            dockerfile: dashy/Dockerfile
          - name: wireguard-ui
            context: .
            dockerfile: wireguard-ui/Dockerfile
          - name: syncthing
            context: .
            dockerfile: syncthing/Dockerfile
          - name: caddy
            context: .
            dockerfile: caddy/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Install Cosign
        uses: sigstore/cosign-installer@3454372f43399081ed03b604cb2d021dabca52bb # v3.8.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYY.MM.DD'}},enable={{is_default_branch}}
            type=sha,prefix=,format=short

      # --- Final safety scan before publish (belt-and-suspenders) ---

      - name: "Build image for scan"
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:preflight
          cache-from: type=gha,scope=${{ matrix.image.name }}

      - name: "Trivy: vulnerability scan"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:preflight
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: "Trivy: generate SARIF"
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}:preflight
          format: 'sarif'
          output: 'trivy-${{ matrix.image.name }}.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        if: always()
        with:
          sarif_file: 'trivy-${{ matrix.image.name }}.sarif'
          category: 'trivy-publish-${{ matrix.image.name }}'

      # --- Build and push image ---
      - name: Build and push image
        id: push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image.name }}
          cache-to: type=gha,scope=${{ matrix.image.name }},mode=max
          sbom: true
          provenance: mode=max

      # --- Cosign Keyless Signing (OIDC / Sigstore) ---
      - name: Sign image with Cosign
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          images=""
          for tag in ${TAGS}; do
            images+="${tag}@${DIGEST} "
          done
          cosign sign --yes ${images}

      # --- Generate and attach SBOM attestation ---
      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@e11c554f704a0b820cbf8c51673f6945e0731532 # v0.20.0
        with:
          image: ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}
          output-file: sbom-${{ matrix.image.name }}.spdx.json
          format: spdx-json

      - name: Attest SBOM with Cosign
        run: |
          cosign attest --yes \
            --predicate sbom-${{ matrix.image.name }}.spdx.json \
            --type spdxjson \
            ${{ env.IMAGE_PREFIX }}/${{ matrix.image.name }}@${{ steps.push.outputs.digest }}

      # --- Upload SBOM as build artifact ---
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom-${{ matrix.image.name }}
          path: sbom-${{ matrix.image.name }}.spdx.json
          retention-days: 90
