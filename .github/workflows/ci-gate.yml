# =============================================================================
# CI Gate — Quality & Security Validation
# Runs on the hardening branch and on PRs targeting hardening or main.
# ALL checks here must pass before a PR can be merged into hardening or main.
# Nothing is published — this is the "prove it works" stage.
# =============================================================================

name: CI Gate

on:
  push:
    branches: [hardening]
    paths:
      - 'sonarr/**'
      - 'radarr/**'
      - 'transmission/**'
      - 'prowlarr/**'
      - 'plex/**'
      - 'dashy/**'
      - 'wireguard-ui/**'
      - 'syncthing/**'
      - 'caddy/**'
      - 'shared/**'
      - '.github/workflows/ci-gate.yml'
      - '.hadolint.yaml'
      - '.trivyignore'
      - '.dockerignore'
  pull_request:
    branches: [hardening, main]
  workflow_dispatch:

permissions: read-all

jobs:
  # ------------------------------------------------------------------
  # Stage 1: Static Analysis (fast, no Docker build needed)
  # ------------------------------------------------------------------
  hadolint:
    name: "Lint: Dockerfile (${{ matrix.image }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [sonarr, radarr, transmission, prowlarr, plex, dashy, wireguard-ui, syncthing, caddy]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: ${{ matrix.image }}/Dockerfile
          failure-threshold: warning
          config: .hadolint.yaml

  shellcheck:
    name: "Lint: Shell Scripts"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: '_legacy'

  # ------------------------------------------------------------------
  # Stage 2: Build + Vulnerability Scan (per image, amd64 only)
  # Images are built but NEVER pushed. This is a validation gate.
  # ------------------------------------------------------------------
  build-and-scan:
    name: "Build + Scan: ${{ matrix.image }}"
    needs: [hadolint, shellcheck]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [sonarr, radarr, transmission, prowlarr, plex, dashy, wireguard-ui, syncthing, caddy]
    env:
      IMAGE_TAG: "ci-gate/${{ matrix.image }}:${{ github.sha }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image (amd64 only, no push)
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image }}/Dockerfile
          platforms: linux/amd64
          pull: true
          push: false
          load: true
          no-cache: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,scope=${{ matrix.image }},mode=max

      # --- Trivy: CRITICAL + HIGH with available fix must be zero ---
      # Uses --ignore-unfixed to skip OS-level CVEs without distro patches.
      # The nightly security-scan.yml separately scans published images for
      # actionable HIGH/CRITICAL CVEs that already have fixes available.
      - name: "Trivy: vulnerability scan"
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      # --- Also upload SARIF for the Security tab ---
      # Applies the same accept-list as the gate scan so Code Scanning
      # only surfaces actionable findings. The nightly security-scan.yml
      # workflow provides a second actionable pass on published images.
      - name: "Trivy: generate SARIF"
        if: always()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ env.IMAGE_TAG }}
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          ignore-unfixed: true
          trivyignores: '.trivyignore'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4.35.2
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'
          category: 'trivy-gate-${{ matrix.image }}'

  # ------------------------------------------------------------------
  # Stage 3: Integration smoke test
  # Start each container, wait for healthcheck, verify it responds.
  # ------------------------------------------------------------------
  smoke-test:
    name: "Smoke Test: ${{ matrix.image.name }}"
    needs: [build-and-scan]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sonarr
            port: 8989
            health_path: /ping
            timeout: 120
          - name: radarr
            port: 7878
            health_path: /ping
            timeout: 120
          - name: transmission
            port: 9091
            health_path: /transmission/web/
            timeout: 60
          - name: prowlarr
            port: 9696
            health_path: /ping
            timeout: 120
          - name: plex
            port: 32400
            health_path: /identity
            timeout: 300
          - name: dashy
            port: 8080
            health_path: /
            timeout: 120
          - name: wireguard-ui
            port: 5000
            health_path: /
            timeout: 60
          - name: syncthing
            port: 8384
            health_path: /rest/noauth/health
            timeout: 60
          - name: caddy
            port: 80
            health_path: /
            timeout: 60
    env:
      IMAGE_TAG: "ci-gate/${{ matrix.image.name }}:${{ github.sha }}"
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ${{ matrix.image.name }}/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: ${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=${{ matrix.image.name }}

      - name: Start container
        run: |
          docker run -d \
            --name test-${{ matrix.image.name }} \
            -e PUID=1000 -e PGID=1000 \
            -p ${{ matrix.image.port }}:${{ matrix.image.port }} \
            ${{ env.IMAGE_TAG }}

      - name: Wait for healthcheck (up to ${{ matrix.image.timeout }}s)
        run: |
          TIMEOUT=${{ matrix.image.timeout }}
          INTERVAL=5
          ATTEMPTS=$(( TIMEOUT / INTERVAL ))
          echo "Waiting for ${{ matrix.image.name }} on port ${{ matrix.image.port }} (timeout: ${TIMEOUT}s)..."
          for i in $(seq 1 "$ATTEMPTS"); do
            if curl -fsS --max-time 5 http://localhost:${{ matrix.image.port }}${{ matrix.image.health_path }} > /dev/null 2>&1; then
              echo "✓ ${{ matrix.image.name }} is healthy after $((i * INTERVAL))s"
              exit 0
            fi
            sleep "$INTERVAL"
          done
          echo "✗ ${{ matrix.image.name }} did not become healthy within ${TIMEOUT}s"
          docker logs test-${{ matrix.image.name }}
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f test-${{ matrix.image.name }} 2>/dev/null || true

  # ------------------------------------------------------------------
  # Final status check — PR merge gate
  # GitHub branch protection should require this job to pass.
  # ------------------------------------------------------------------
  gate-passed:
    name: "✅ All CI Gates Passed"
    needs: [hadolint, shellcheck, build-and-scan, smoke-test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all gate results
        run: |
          echo "Hadolint:       ${{ needs.hadolint.result }}"
          echo "ShellCheck:     ${{ needs.shellcheck.result }}"
          echo "Build+Scan:     ${{ needs.build-and-scan.result }}"
          echo "Smoke Tests:    ${{ needs.smoke-test.result }}"

          if [[ "${{ needs.hadolint.result }}" != "success" ]] || \
             [[ "${{ needs.shellcheck.result }}" != "success" ]] || \
             [[ "${{ needs.build-and-scan.result }}" != "success" ]] || \
             [[ "${{ needs.smoke-test.result }}" != "success" ]]; then
            echo ""
            echo "::error::One or more CI gates failed. Fix the issues on the hardening branch before merging to main."
            exit 1
          fi

          echo ""
          echo "All gates passed. This PR is safe to merge into main."
