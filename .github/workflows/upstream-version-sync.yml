name: Sync Upstream Versions

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

permissions: read-all

concurrency:
  group: upstream-version-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Refresh pinned upstream versions
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout hardening branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: hardening
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Refresh pinned upstream versions
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./.github/scripts/sync-upstream-versions.sh

      - name: Check for updates
        id: changes
        run: |
          if git diff --quiet; then
            echo 'changed=false' >> "$GITHUB_OUTPUT"
            echo 'No upstream version changes detected.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo 'changed=true' >> "$GITHUB_OUTPUT"
          {
            echo 'Updated pinned upstream versions in:'
            git diff --name-only
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit and push hardening updates
        if: steps.changes.outputs.changed == 'true'
        run: |
          git add caddy/Dockerfile dashy/Dockerfile plex/Dockerfile prowlarr/Dockerfile \
                  radarr/Dockerfile sonarr/Dockerfile syncthing/Dockerfile \
                  transmission/Dockerfile wireguard-ui/Dockerfile
          git commit -m 'chore: sync upstream application versions'
          git push origin HEAD:hardening

      - name: Ensure hardening PR exists
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh pr list --base main --head hardening --state open --json number --jq 'length')" -eq 0 ]; then
            gh pr create \
              --base main \
              --head hardening \
              --title 'chore: sync upstream application versions' \
              --body 'Automated upstream release sync updated the pinned application versions on `hardening`. `CI Gate` has been dispatched for the updated commit; merge to `main` only after all required checks pass.'
          fi

      - name: Dispatch CI Gate on hardening
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run ci-gate.yml --ref hardening