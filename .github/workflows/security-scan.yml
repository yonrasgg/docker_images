# =============================================================================
# Nightly Security Scan — Published Images
# Catches new CVEs disclosed after an image was built.
# Linting is handled by ci-gate.yml (runs on hardening branch / PRs).
# =============================================================================

name: Nightly Security Scan

on:
  schedule:
    # Nightly scan to catch new CVEs in published images
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  grype-scan:
    name: "Grype: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [sonarr, radarr, sabnzbd, jackett, plex]
    steps:
      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest || true

      - name: Run Grype scan
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          severity-cutoff: high
          fail-build: false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'grype-nightly-${{ matrix.image }}'
