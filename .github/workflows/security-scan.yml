# =============================================================================
# Security Scanning for Docker Images
# Runs on all PRs and nightly on main
# =============================================================================

name: Security Scan

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly scan to catch new CVEs
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  hadolint:
    name: Dockerfile Linting
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - sonarr/Dockerfile
          - radarr/Dockerfile
          - sabnzbd/Dockerfile
          - jackett/Dockerfile
          - plex/Dockerfile
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: ${{ matrix.dockerfile }}
          failure-threshold: warning

  grype-scan:
    name: Grype Vulnerability Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        image:
          - sonarr
          - radarr
          - sabnzbd
          - jackett
          - plex
    steps:
      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest || true

      - name: Run Grype scan
        uses: anchore/scan-action@2c901ab7378897c01b8efaa2d0c9bf519cc64b9e # v4.1.2
        id: scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          severity-cutoff: high
          fail-build: false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'grype-${{ matrix.image }}'

  shellcheck:
    name: Shell Script Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: '.'
          severity: warning
