# =============================================================================
# Nightly Security Scan — Published Images
# Catches new CVEs disclosed after an image was built.
# Linting is handled by ci-gate.yml (runs on hardening branch / PRs).
# =============================================================================

name: Nightly Security Scan

on:
  schedule:
    # Nightly scan to catch new CVEs in published images
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions: read-all

jobs:
  grype-scan:
    name: "Grype: ${{ matrix.image }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image: [sonarr, radarr, sabnzbd, jackett, plex, dashy]
    steps:
      - name: Pull latest image
        id: pull
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest"
          OUTPUT=$(docker pull "${IMAGE}" 2>&1) && {
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          }
          # Distinguish "not found" from transient failures
          if echo "${OUTPUT}" | grep -qiE 'manifest unknown|not found|404'; then
            echo "::warning::${IMAGE} not published yet — skipping scan"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Failed to pull ${IMAGE}: ${OUTPUT}"
            exit 1
          fi

      - name: Run Grype scan
        if: steps.pull.outputs.exists == 'true'
        uses: anchore/scan-action@64a33b277ea7a1215a3c142735a1091341939ff5 # v4.1.2
        id: scan
        with:
          image: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          severity-cutoff: high
          fail-build: false

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3.35.1
        if: always() && steps.pull.outputs.exists == 'true'
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: 'grype-nightly-${{ matrix.image }}'
